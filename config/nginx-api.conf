# ─────────────────────────────────────────────────────────────────────────────
# Nginx location blocks for b-wirtschaften.de
#
# Add these INSIDE the existing server { } block.
# Typical location on Plesk: /etc/nginx/conf.d/b-wirtschaften.de.conf
# or as an Additional nginx directives snippet in Plesk UI.
#
# After adding:
#   nginx -t && systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

    # ── API reverse proxy (Node.js server on port 3100) ──────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3100;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Forward x-api-key and other custom headers unchanged
        proxy_pass_request_headers on;

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
        proxy_buffering       off;
    }

    # ── Static data files served directly by nginx (no Node.js needed) ───────
    location /data/ {
        alias /var/www/vhosts/b-wirtschaften.de/httpdocs/data/;
        default_type application/json;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
        # Prevent directory listing
        autoindex off;
    }
